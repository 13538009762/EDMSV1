<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; }
  .main-wrapper {
    flex: 1; overflow: auto; padding: 32px; display: flex; justify-content: center; align-items: flex-start;
  }
  .main-paper {
    position: relative; background: white; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.13); flex-shrink: 0; padding: 0; overflow: hidden; width: 800px;
  }
  .tiptap { padding: 40px; }
  .content { height: 3000px; background: linear-gradient(red, blue); }
</style>
</head>
<body>
  <div class="main-wrapper">
    <div class="main-paper" style="height: 3369px;">
       <div class="tiptap"><div class="content"></div></div>
    </div>
  </div>
</body>
</html>
